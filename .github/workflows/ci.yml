name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          # Dummy values so the build/env validation passes in CI.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key-DO-NOT-LEAK
      - name: Assert no service-role key in the client bundle
        run: |
          if grep -rl "ci-service-role-key-DO-NOT-LEAK\|sb_secret_" .next/static 2>/dev/null; then
            echo "::error::A server secret leaked into the client bundle"; exit 1
          fi
          echo "✓ No server secrets found in the client bundle"
